set -e
CODEX_DIR="$HOME/.codex"
mkdir -p "$CODEX_DIR"

backup_file() {
  source_file="$CODEX_DIR/$1"
  [ -f "$source_file" ] || return 0
  backup_file="$source_file.bak"
  if [ -e "$backup_file" ]; then
    index=1
    while [ -e "$source_file.bak.$index" ]; do
      index=$((index + 1))
    done
    backup_file="$source_file.bak.$index"
  fi
  echo "正在备份 $1..."
  cp "$source_file" "$backup_file"
  echo "已备份到 $backup_file"
}

backup_file "config.toml"
backup_file "auth.json"

cat > "$CODEX_DIR/config.toml" <<'SUB2API_CODEX_CONFIG_TOML'
model_provider = "MyOpenAI"
review_model = "gpt-5.5"
model_reasoning_effort = "xhigh"
disable_response_storage = true
network_access = "enabled"
windows_wsl_setup_acknowledged = true
model_context_window = 1000000
model_auto_compact_token_limit = 900000

[model_providers.MyOpenAI]
name = "MyOpenAI"
base_url = "http://127.0.0.1:8787/v1"
wire_api = "responses"
requires_openai_auth = true
SUB2API_CODEX_CONFIG_TOML

cat > "$CODEX_DIR/auth.json" <<'SUB2API_CODEX_AUTH_JSON'
{
  "OPENAI_API_KEY": "local-dev-key"
}
SUB2API_CODEX_AUTH_JSON

echo "配置完成。如果 Codex CLI 已经在运行，请重启后再使用。"